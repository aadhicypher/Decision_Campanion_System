<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Decide</title>
    <style>
        :root { --primary:#3b82f6; --primary-dark:#1d4ed8; --text:#dbe7fb; --muted:#9db0cc; --line:#273449; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; min-height: 100vh; color: var(--text); background: radial-gradient(circle at top left, #13213a 0%, #0b1220 45%, #070c16 100%); }
        .wrap { max-width: 460px; margin: 80px auto; padding: 0 1rem; }
        .card { background: rgba(15, 24, 40, 0.94); border: 1px solid var(--line); border-radius: 12px; padding: 1.5rem; box-shadow: 0 14px 28px rgba(0,0,0,.3); }
        h2 { margin-bottom: .6rem; }
        p { color: var(--muted); margin-bottom: 1rem; }
        input { width: 100%; padding: .85rem 1rem; border-radius: 8px; border: 1px solid #3a4b66; background: #0f1a2c; color: var(--text); margin-bottom: 1rem; }
        button { width: 100%; padding: .9rem 1rem; border: 0; border-radius: 8px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
        button:hover { background: var(--primary-dark); }
        .error { color: #fecaca; margin-bottom: .8rem; }
        .success { color: #86efac; margin-bottom: .8rem; }
        a { color: #93c5fd; text-decoration: none; display: inline-block; margin-top: .9rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h2>Forgot Password</h2>
            <p>Enter your account email. We'll send a one-time OTP.</p>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            {% if success %}<div class="success">{{ success }}</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Send OTP</button>
            </form>
            <a href="{% url 'login' %}">Back to login</a>
        </div>
    </div>
</body>
</html>
