<!DOCTYPE html>
<html>
<head>
    <title>Create Decision</title>
</head>
<body>

<h2>Create Decision</h2>

<form method="POST">
    {% csrf_token %}

    <label>Select Category:</label>
    <select id="category">
        <option value="">Select Category</option>
        {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Select SubCategory:</label>
    <select name="subcategory" id="subcategory" required>
        <option value="">Select SubCategory</option>
        {% for category in categories %}
            {% for sub in category.subcategories.all %}
                <option value="{{ sub.id }}" data-category="{{ category.id }}">
                    {{ sub.name }}
                </option>
            {% endfor %}
        {% endfor %}
    </select>

    <br><br>

    <label>Decision Description:</label>
    <input type="text" name="context" required>

    <br><br>

    <label>Enter Options (comma separated):</label>
    <input type="text" name="options" required>

    <br><br>

    <button type="submit">Next</button>

</form>

<script>
    const categorySelect = document.getElementById("category");
    const subcategorySelect = document.getElementById("subcategory");

    categorySelect.addEventListener("change", function () {
        const selectedCategory = this.value;

        for (let option of subcategorySelect.options) {
            if (!option.value) continue;

            if (option.getAttribute("data-category") === selectedCategory) {
                option.style.display = "block";
            } else {
                option.style.display = "none";
            }
        }

        subcategorySelect.value = "";
    });
</script>

</body>
</html>
