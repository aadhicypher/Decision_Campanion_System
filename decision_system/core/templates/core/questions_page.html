<!DOCTYPE html>
<html>
<head>
    <title>Score Options</title>
</head>
<body>

<h2>Score Your Options</h2>
<h4>{{ decision.context }}</h4>

<form method="POST">
    {% csrf_token %}

    {% for criterion in criteria %}
        <h4>{{ criterion.name }}</h4>

        {% for option in options %}
            <label>{{ option.name }}</label>
            <input type="range"
                   name="{{ criterion.id }}__{{ option.id }}"
                   min="1"
                   max="5"
                   value="3">
            <br><br>
        {% endfor %}

        <hr>
    {% endfor %}

    <button type="submit">Calculate Result</button>

</form>

</body>
</html>
