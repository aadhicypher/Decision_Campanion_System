<!DOCTYPE html>
<html>
<head>
    <title>Score Options</title>
</head>
<body>

<h2>Score the Options</h2>

<form method="POST">
    {% csrf_token %}

    {% for question in questions %}
        <h4>{{ question }}</h4>

        {% for option in options %}
            <label>{{ option }}</label>
            <input type="range" name="{{ question }}__{{ option }}"
                   min="1" max="5" value="3">
            <br><br>
        {% endfor %}
        <hr>
    {% endfor %}

    <button type="submit">Submit Scores</button>
</form>

</body>
</html>
