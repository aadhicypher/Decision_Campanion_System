{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Decision Companion</title>

<style>

body{
margin:0;
font-family:Arial;
}

.header{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #ddd;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:250px;
border-right:1px solid #ddd;
padding:10px;
background:#f7f7f8;
}

.new-decision{
width:100%;
padding:10px;
background:#10a37f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:15px;
}

.history-item{
display:block;
padding:10px;
text-decoration:none;
color:black;
border-bottom:1px solid #eee;
}

.history-item:hover{
background:#e9e9e9;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.main button{
padding:20px 40px;
font-size:20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<h2>Decide</h2>

<div>
Profile
</div>

</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<a href="{% url 'decision_form' %}">
<button class="new-decision">
+ Make Decision
</button>
</a>

{% for decision in decisions %}

<a class="history-item"
   href="{% url 'decision_history' decision.id %}">

{{ decision.context }}

</a>

{% endfor %}

</div>

<!-- MAIN AREA -->
<div class="main">

<a href="{% url 'decision_form' %}">
<button>
Make Decision
</button>
</a>

</div>

</div>

</body>
</html>
